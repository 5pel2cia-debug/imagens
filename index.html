<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cavalaria</title>
    <link rel="icon" href="favicon-96x96.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        #conteudo {
            height: 100%;
            width: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .mensagem {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 2rem;
            color: #333;
        }
    </style>
</head>
<body>
    <div id="conteudo">
        <div class="mensagem">
            <p>Carregando o script...</p>
        </div>
    </div>

    <script>
        const BASE_URL = 'https://script.google.com/macros/s/AKfycbwZnyN-qG5vClvUH0CZXFvqx7vhrDS_fwYjWQjPnbgFiycxsr3e2WkJjL8czs1ouuKY7Q/exec';
        const MENU_URL = 'https://script.google.com/macros/s/AKfycby9ko-8aCrNG3nhu8uT8j1xfcN9gmNW1-vEZr18crj5/exec?funcao=menu';

        const queryString = window.location.search;
        const container = document.getElementById('conteudo');

        window.addEventListener('message', function(event) {
            // Opcional: verifique a origem da mensagem (para segurança)
            // if (event.origin !== 'https://script.google.com') return;
            if (event.data && event.data.titulo) {
                document.title = event.data.titulo;
                console.log('Título alterado para:', event.data.titulo);
            }
        });

        function criarIframe(url) {
            const iframe = document.createElement('iframe');
            iframe.src = url;
            iframe.title = "Cavalaria";
            // Permissões críticas para autenticação no iframe
            iframe.setAttribute('allow', 
                'cookies; ' +
                'storage-access-by-user-activation; ' +
                'cross-origin-isolated; ' +
                'same-origin-allow-popups; ' +
                'geolocation; microphone; camera; midi; encrypted-media'
            );
            // A sandbox libera o que o Google precisa para login
            iframe.setAttribute('sandbox', 
                'allow-same-origin ' +
                'allow-scripts ' +
                'allow-popups ' +
                'allow-forms ' +
                'allow-storage-access-by-user-activation'
            );
            return iframe;
        }

        if (queryString) {
            const urlCompleta = BASE_URL + queryString;
            const iframe = criarIframe(urlCompleta);
            container.innerHTML = '';
            container.appendChild(iframe);
        } else {
            const iframe = criarIframe(MENU_URL);
            container.innerHTML = '';
            container.appendChild(iframe);
        }
    </script>
</body>
</html>

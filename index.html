<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cavalaria</title>
    <style>
        /* Reset e ocupação total da tela */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;           /* garante que o body ocupe toda altura */
            width: 100%;
            overflow: hidden;       /* evita scroll duplicado */
        }

        /* Container principal ocupa 100% do body */
        #conteudo {
            height: 100%;
            width: 100%;
        }

        /* Iframe ocupa 100% do container */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;         /* remove espaço extra inline */
        }

        /* Estilos para mensagem de erro/instrução */
        .mensagem {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 2rem;
            color: #333;
        }
        .erro {
            background: #ffeeee;
            border: 1px solid #ffcccc;
            border-radius: 8px;
            max-width: 600px;
            margin: 2rem auto;
            padding: 1rem;
        }
        code {
            background: #f4f4f4;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="conteudo">
        <div class="mensagem">
            <p>Carregando o script...</p>
        </div>
    </div>

    <script>
        // URL base do Google Apps Script (sem parâmetros)
        const BASE_URL = 'https://script.google.com/macros/s/AKfycbwZnyN-qG5vClvUH0CZXFvqx7vhrDS_fwYjWQjPnbgFiycxsr3e2WkJjL8czs1ouuKY7Q/exec';

        const queryString = window.location.search;
        const container = document.getElementById('conteudo');

        if (queryString) {
            const urlCompleta = BASE_URL + queryString;
            const iframe = document.createElement('iframe');
            iframe.src = urlCompleta;
            iframe.title = "Cavalaria";
            // Permissões adicionais, se necessário
            iframe.setAttribute('allow', 'geolocation; microphone; camera; midi; encrypted-media');

            container.innerHTML = '';
            container.appendChild(iframe);
        } else {
           const MENU_URL = 'https://script.google.com/macros/s/AKfycby9ko-8aCrNG3nhu8uT8j1xfcN9gmNW1-vEZr18crj5/exec?funcao=menu';
            const iframe = document.createElement('iframe');
            iframe.src = MENU_URL;
            iframe.title = "Cavalaria";
            // Permissões adicionais, se necessário
            iframe.setAttribute('allow', 'geolocation; microphone; camera; midi; encrypted-media');

            container.innerHTML = '';
            container.appendChild(iframe);
        }
    </script>
</body>
</html>

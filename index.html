<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando Script...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden; /* Evita barras de rolagem duplas */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .mensagem {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 2rem;
            color: #333;
        }
        .erro {
            background: #ffeeee;
            border: 1px solid #ffcccc;
            border-radius: 8px;
            max-width: 600px;
            margin: 2rem auto;
            padding: 1rem;
        }
        code {
            background: #f4f4f4;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="conteudo">
        <div class="mensagem">
            <p>Carregando o script...</p>
        </div>
    </div>

    <script>
        // URL base do Google Apps Script (sem parâmetros)
        const BASE_URL = 'https://script.google.com/macros/s/AKfycbwZnyN-qG5vClvUH0CZXFvqx7vhrDS_fwYjWQjPnbgFiycxsr3e2WkJjL8czs1ouuKY7Q/exec';

        // Obtém toda a string de consulta da URL atual (ex: "?cod=123&funcao=escala")
        const queryString = window.location.search;

        // Elemento onde vamos injetar o iframe
        const container = document.getElementById('conteudo');

        if (queryString) {
            // Monta a URL completa com os parâmetros recebidos
            const urlCompleta = BASE_URL + queryString;

            // Cria o iframe
            const iframe = document.createElement('iframe');
            iframe.src = urlCompleta;
            iframe.title = "Google Apps Script";
            iframe.setAttribute('allow', 'geolocation; microphone; camera; midi; encrypted-media'); // opcional, dependendo do que seu script precisa

            // Remove a mensagem de carregamento e insere o iframe
            container.innerHTML = '';
            container.appendChild(iframe);
        } else {
            // Nenhum parâmetro informado – exibe instruções
            container.innerHTML = `
                <div class="mensagem erro">
                    <h2>⚠️ Nenhum parâmetro foi informado</h2>
                    <p>Use a URL no formato:</p>
                    <p><code>https://SEU_USUARIO.github.io/SEU_REPOSITORIO/?cod=VALOR</code></p>
                    <p>ou</p>
                    <p><code>https://SEU_USUARIO.github.io/SEU_REPOSITORIO/?funcao=escala&teste=1</code></p>
                    <p>Os parâmetros serão repassados ao Google Apps Script dentro do iframe.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
